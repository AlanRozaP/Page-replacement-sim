<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Replacement Visualizer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --hit: #3fb950;
      --fault: #f85149;
      --frame-bg: #21262d;
      --frame-border: #30363d;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --radius: 6px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      line-height: 1.5;
    }

    header {
      text-align: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--panel-border);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    input, select, button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 0.4rem 0.6rem;
      font-family: inherit;
    }

    button {
      cursor: pointer;
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden { display: none; }

    #memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .frame {
      aspect-ratio: 1;
      background: var(--frame-bg);
      border: 2px solid var(--frame-border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      position: relative;
    }

    .frame.new { border-color: var(--fault); box-shadow: 0 0 8px var(--fault); }
    .frame.hit { border-color: var(--hit); }

    .bit { font-size: 0.6rem; color: var(--muted); }

    #timeline { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.5rem; }

    .access-btn {
      width: 2rem;
      background: var(--frame-bg);
      color: var(--text);
    }

    .access-btn.active { outline: 2px solid var(--accent); }
    .access-btn.hit { border-color: var(--hit); }
    .access-btn.fault { border-color: var(--fault); }

    #playback {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }

    #viz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chart { margin-bottom: 1rem; }
    .chart svg { width: 100%; height: auto; }
    .chart h3 { margin: 0.5rem 0; color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>Page Replacement Visualizer</h1>
    <p>FIFO · LRU · Optimal · Clock</p>
  </header>

  <main>
    <section id="input-panel">
      <h2>Workload</h2>
      <label>
        Frames:
        <input type="number" id="frames" value="3" min="1" max="32" />
      </label>

      <label>
        Input source:
        <select id="input-source">
          <option value="custom">Custom reference string</option>
          <option value="scenario">Preset scenario</option>
          <option value="random">Random workload</option>
        </select>
      </label>

      <div id="custom-input">
        <label>
          Reference string (space-separated integers):
          <input type="text" id="refs" value="1 2 3 4 1 2 5 1 2 3 4 5" />
        </label>
      </div>

      <div id="scenario-input" class="hidden">
        <label>
          Scenario:
          <select id="scenario">
            <option value="default">Default</option>
            <option value="social_media">Social Media</option>
            <option value="gaming">Gaming</option>
            <option value="multitasking">Multitasking</option>
          </select>
        </label>
      </div>

      <div id="random-input" class="hidden">
        <label>Length: <input type="number" id="length" value="50" min="1" max="500" /></label>
        <label>Pages: <input type="number" id="pages" value="10" min="1" max="100" /></label>
        <label>Locality: <input type="number" id="locality" value="0.8" min="0" max="1" step="0.05" /></label>
        <label>Seed: <input type="number" id="seed" value="123" min="0" /></label>
      </div>

      <button id="run">Run Simulation</button>
    </section>
    <section id="playback">
      <button id="btn-first">⏮</button>
      <button id="btn-prev">◀</button>
      <button id="btn-play">▶</button>
      <button id="btn-next">▶</button>
      <button id="btn-last">⏭</button>
      <label>Speed: <input type="range" id="speed" min="100" max="1500" value="500" /></label>
    </section>
    <section id="visualization">
      <div id="viz-header">
        <label>
          Viewing:
          <select id="view-algo">
            <option value="FIFO">FIFO</option>
            <option value="LRU">LRU</option>
            <option value="Optimal">Optimal</option>
            <option value="Clock">Clock</option>
          </select>
        </label>
        <span id="step-info">Step 0 / 0</span>
      </div>
      <div id="timeline">
        <!-- access buttons generated here -->
      </div>
      <div id="memory-grid">
        <!-- memory frames generated here -->
      </div>
    </section>
    <section id="charts">
      <h2>Comparison</h2>
      <div id="chart-faults" class="chart"></div>
      <div id="chart-hitrate" class="chart"></div>
    </section>
  </main>

  <script>
    // Workload generator helpers
    function mulberry32(a) {
      return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shuffle(array, rng) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function generateWorkload(length, numPages, locality, seed) {
      const rng = seed != null ? mulberry32(seed) : Math.random;
      const workingSetSize = Math.max(1, Math.floor(numPages * (1 - locality) + 3));
      const allPages = Array.from({ length: numPages }, (_, i) => i + 1);
      shuffle(allPages, rng);
      const workingSet = allPages.slice(0, workingSetSize);
      const refs = [];
      for (let i = 0; i < length; i++) {
        refs.push(rng() < locality ? workingSet[Math.floor(rng() * workingSet.length)] : Math.floor(rng() * numPages) + 1);
      }
      return refs;
    }

    const SCENARIOS = {
      default: [1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5],
      social_media: [1, 1, 2, 1, 3, 2, 1, 4, 1, 2, 3, 1, 5, 1],
      gaming: [1, 2, 3, 4, 5, 6, 1, 2, 3, 4, 5, 6, 7, 1, 2],
      multitasking: [1, 2, 3, 4, 5, 1, 6, 2, 7, 3, 8, 4, 9, 5, 10],
    };

    // Algorithm classes
    class PageReplacementAlgorithm {
      constructor(frames) {
        this.frames = frames;
        this.pageFaults = 0;
        this.hits = 0;
        this.history = []; // { access, hit, memory, evicted, extra }
      }
      hitRate() {
        const total = this.hits + this.pageFaults;
        return total ? this.hits / total : 0;
      }
    }

    class FIFO extends PageReplacementAlgorithm {
      constructor(frames) {
        super(frames);
        this.memory = [];
        this.memorySet = new Set();
      }
      access(page) {
        let hit = true;
        let evicted = null;
        if (this.memorySet.has(page)) {
          this.hits++;
        } else {
          this.pageFaults++;
          hit = false;
          if (this.memory.length < this.frames) {
            this.memory.push(page);
            this.memorySet.add(page);
          } else {
            evicted = this.memory.shift();
            this.memorySet.delete(evicted);
            this.memory.push(page);
            this.memorySet.add(page);
          }
        }
        this.history.push({ access: page, hit, memory: [...this.memory], evicted, extra: null });
        return hit;
      }
    }

    class LRU extends PageReplacementAlgorithm {
      constructor(frames) {
        super(frames);
        this.memory = [];
        this.memorySet = new Set();
      }
      access(page) {
        let hit = true;
        let evicted = null;
        if (this.memorySet.has(page)) {
          this.hits++;
          this.memory.splice(this.memory.indexOf(page), 1);
          this.memory.push(page);
        } else {
          this.pageFaults++;
          hit = false;
          if (this.memory.length < this.frames) {
            this.memory.push(page);
            this.memorySet.add(page);
          } else {
            evicted = this.memory.shift();
            this.memorySet.delete(evicted);
            this.memory.push(page);
            this.memorySet.add(page);
          }
        }
        this.history.push({ access: page, hit, memory: [...this.memory], evicted, extra: null });
        return hit;
      }
    }

    class Optimal extends PageReplacementAlgorithm {
      constructor(frames, referenceString) {
        super(frames);
        this.referenceString = referenceString;
        this.currentIndex = 0;
        this.memory = [];
        this.memorySet = new Set();
      }
      access(page) {
        let hit = true;
        let evicted = null;
        if (this.memorySet.has(page)) {
          this.hits++;
        } else {
          this.pageFaults++;
          hit = false;
          if (this.memory.length < this.frames) {
            this.memory.push(page);
            this.memorySet.add(page);
          } else {
            let farthest = -1;
            let evictIdx = 0;
            for (let i = 0; i < this.memory.length; i++) {
              const nextUse = this.referenceString.indexOf(this.memory[i], this.currentIndex + 1);
              const distance = nextUse === -1 ? Infinity : nextUse;
              if (distance > farthest) {
                farthest = distance;
                evictIdx = i;
              }
            }
            evicted = this.memory.splice(evictIdx, 1)[0];
            this.memorySet.delete(evicted);
            this.memory.push(page);
            this.memorySet.add(page);
          }
        }
        this.currentIndex++;
        this.history.push({ access: page, hit, memory: [...this.memory], evicted, extra: null });
        return hit;
      }
    }

    class Clock extends PageReplacementAlgorithm {
      constructor(frames) {
        super(frames);
        this.memory = [];
        this.referenceBits = [];
        this.memorySet = new Set();
        this.hand = 0;
      }
      access(page) {
        let hit = true;
        let evicted = null;
        if (this.memorySet.has(page)) {
          this.hits++;
          const idx = this.memory.indexOf(page);
          this.referenceBits[idx] = 1;
        } else {
          this.pageFaults++;
          hit = false;
          if (this.memory.length < this.frames) {
            this.memory.push(page);
            this.referenceBits.push(0);
            this.memorySet.add(page);
          } else {
            while (true) {
              if (this.referenceBits[this.hand] === 0) {
                evicted = this.memory[this.hand];
                this.memorySet.delete(evicted);
                this.memory[this.hand] = page;
                this.referenceBits[this.hand] = 1;
                this.memorySet.add(page);
                this.hand = (this.hand + 1) % this.frames;
                break;
              } else {
                this.referenceBits[this.hand] = 0;
                this.hand = (this.hand + 1) % this.frames;
              }
            }
          }
        }
        this.history.push({
          access: page,
          hit,
          memory: [...this.memory],
          evicted,
          extra: { referenceBits: [...this.referenceBits], hand: this.hand },
        });
        return hit;
      }
    }

    // Input handling
    const sourceSelect = document.getElementById('input-source');

    function updateInputVisibility() {
      document.getElementById('custom-input').classList.toggle('hidden', sourceSelect.value !== 'custom');
      document.getElementById('scenario-input').classList.toggle('hidden', sourceSelect.value !== 'scenario');
      document.getElementById('random-input').classList.toggle('hidden', sourceSelect.value !== 'random');
    }

    sourceSelect.addEventListener('change', updateInputVisibility);
    updateInputVisibility();

    function gatherInput() {
      const frames = parseInt(document.getElementById('frames').value, 10);
      const source = sourceSelect.value;
      let refs;
      if (source === 'custom') {
        const raw = document.getElementById('refs').value.trim();
        refs = raw.split(/\s+/).map(Number).filter(n => !isNaN(n));
      } else if (source === 'scenario') {
        refs = [...SCENARIOS[document.getElementById('scenario').value]];
      } else {
        const length = parseInt(document.getElementById('length').value, 10);
        const pages = parseInt(document.getElementById('pages').value, 10);
        const locality = parseFloat(document.getElementById('locality').value);
        const seed = parseInt(document.getElementById('seed').value, 10);
        refs = generateWorkload(length, pages, locality, seed);
      }
      return { frames, refs };
    }

    let currentResults = null;
    let currentReferenceString = [];
    let currentAlgoIndex = 0;
    let currentStep = 0;
    let playbackTimer = null;

    function renderViz() {
      if (!currentResults) return;
      const algo = currentResults[currentAlgoIndex];
      const step = algo.history[currentStep];
      const frames = parseInt(document.getElementById('frames').value, 10);

      document.getElementById('step-info').textContent =
        `Step ${currentStep + 1} / ${algo.history.length} — ${step.hit ? 'HIT' : 'FAULT'}`;

      const timeline = document.getElementById('timeline');
      timeline.innerHTML = currentReferenceString.map((p, i) => {
        const h = algo.history[i];
        return `<button class="access-btn ${i === currentStep ? 'active' : ''} ${h.hit ? 'hit' : 'fault'}"
            data-index="${i}">${p}</button>`;
      }).join('');

      const grid = document.getElementById('memory-grid');
      grid.innerHTML = '';
      for (let i = 0; i < frames; i++) {
        const page = step.memory[i];
        const isNew = page === step.access && !step.hit;
        const cell = document.createElement('div');
        cell.className = `frame ${isNew ? 'new' : ''} ${step.hit ? 'hit' : ''}`;
        cell.innerHTML = `<span>${page ?? ''}</span>`;
        if (algo.name === 'Clock' && step.extra && page != null) {
          const idx = step.memory.indexOf(page);
          cell.innerHTML += `<span class="bit">R:${step.extra.referenceBits[idx]}</span>`;
        }
        grid.appendChild(cell);
      }
    }

    function stopPlayback() {
      if (playbackTimer) { clearInterval(playbackTimer); playbackTimer = null; }
      document.getElementById('btn-play').textContent = '▶';
    }

    function resetPlayback() {
      currentStep = 0;
      stopPlayback();
      renderViz();
    }

    function setPlaybackEnabled(enabled) {
      ['btn-first', 'btn-prev', 'btn-play', 'btn-next', 'btn-last', 'view-algo'].forEach(id => {
        document.getElementById(id).disabled = !enabled;
      });
    }

    setPlaybackEnabled(false);

    document.getElementById('view-algo').addEventListener('change', e => {
      currentAlgoIndex = currentResults ? currentResults.findIndex(r => r.name === e.target.value) : 0;
      resetPlayback();
    });

    document.getElementById('timeline').addEventListener('click', e => {
      if (e.target.matches('.access-btn')) {
        currentStep = parseInt(e.target.dataset.index, 10);
        stopPlayback();
        renderViz();
      }
    });

    document.getElementById('btn-first').addEventListener('click', () => { currentStep = 0; stopPlayback(); renderViz(); });
    document.getElementById('btn-prev').addEventListener('click', () => { currentStep = Math.max(0, currentStep - 1); stopPlayback(); renderViz(); });
    document.getElementById('btn-next').addEventListener('click', () => { currentStep = Math.min(currentResults[currentAlgoIndex].history.length - 1, currentStep + 1); stopPlayback(); renderViz(); });
    document.getElementById('btn-last').addEventListener('click', () => { currentStep = currentResults[currentAlgoIndex].history.length - 1; stopPlayback(); renderViz(); });

    document.getElementById('btn-play').addEventListener('click', () => {
      if (playbackTimer) { stopPlayback(); return; }
      document.getElementById('btn-play').textContent = '⏸';
      const speed = parseInt(document.getElementById('speed').value, 10);
      playbackTimer = setInterval(() => {
        if (currentStep >= currentResults[currentAlgoIndex].history.length - 1) {
          stopPlayback();
          return;
        }
        currentStep++;
        renderViz();
      }, speed);
    });

    function runAll(frames, referenceString) {
      const algos = [
        new FIFO(frames),
        new LRU(frames),
        new Optimal(frames, referenceString),
        new Clock(frames),
      ];
      for (const algo of algos) {
        for (const page of referenceString) {
          algo.access(page);
        }
      }
      return algos.map(algo => ({
        name: algo.constructor.name,
        faults: algo.pageFaults,
        hits: algo.hits,
        hitRate: algo.hitRate(),
        history: algo.history,
      }));
    }

    function createSummaryContainer() {
      const el = document.createElement('section');
      el.id = 'summary';
      document.querySelector('main').appendChild(el);
      return el;
    }

    function renderSummary(results) {
      const container = document.getElementById('summary') || createSummaryContainer();
      const rows = results.map(r => `
        <tr>
          <td>${r.name}</td>
          <td>${r.faults}</td>
          <td>${r.hits}</td>
          <td>${(r.hitRate * 100).toFixed(2)}%</td>
        </tr>
      `).join('');
      container.innerHTML = `
        <table class="summary-table">
          <thead><tr><th>Algorithm</th><th>Faults</th><th>Hits</th><th>Hit Rate</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderBarChart(containerId, results, key, label, color) {
      const container = document.getElementById(containerId);
      const width = container.clientWidth || 600;
      const height = 200;
      const margin = { top: 20, right: 20, bottom: 40, left: 50 };
      const chartW = width - margin.left - margin.right;
      const chartH = height - margin.top - margin.bottom;
      const max = Math.max(...results.map(r => r[key])) || 1;

      const bars = results.map((r, i) => {
        const barH = (r[key] / max) * chartH;
        const x = (i * (chartW / results.length)) + (chartW / results.length) * 0.15;
        const w = (chartW / results.length) * 0.7;
        const y = chartH - barH;
        return `
          <rect x="${x}" y="${y}" width="${w}" height="${barH}" fill="${color}" rx="4" />
          <text x="${x + w/2}" y="${y - 6}" text-anchor="middle" fill="var(--text)" font-size="12">${r[key]}</text>
          <text x="${x + w/2}" y="${chartH + 18}" text-anchor="middle" fill="var(--muted)" font-size="12">${r.name}</text>
        `;
      }).join('');

      container.innerHTML = `
        <h3>${label}</h3>
        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
          <g transform="translate(${margin.left},${margin.top})">
            ${bars}
            <line x1="0" y1="${chartH}" x2="${chartW}" y2="${chartH}" stroke="var(--panel-border)" />
          </g>
        </svg>
      `;
    }

    function renderCharts(results) {
      renderBarChart('chart-faults', results, 'faults', 'Page Faults', 'var(--fault)');
      renderBarChart('chart-hitrate', results, 'hitRate', 'Hit Rate', 'var(--hit)');
    }

    document.getElementById('run').addEventListener('click', () => {
      const { frames, refs } = gatherInput();
      currentReferenceString = refs;
      currentResults = runAll(frames, refs);
      renderSummary(currentResults);
      renderCharts(currentResults);
      setPlaybackEnabled(true);
      resetPlayback();
    });
  </script>
</body>
</html>
