<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Replacement Visualizer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --hit: #3fb950;
      --fault: #f85149;
      --frame-bg: #21262d;
      --frame-border: #30363d;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --radius: 6px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      line-height: 1.5;
    }

    header {
      text-align: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--panel-border);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    input, select, button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 0.4rem 0.6rem;
      font-family: inherit;
    }

    button {
      cursor: pointer;
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Page Replacement Visualizer</h1>
    <p>FIFO · LRU · Optimal · Clock</p>
  </header>

  <main>
    <section id="input-panel">...</section>
    <section id="playback">...</section>
    <section id="visualization">...</section>
    <section id="charts">...</section>
  </main>

  <script>
    // Tasks 3-10 fill this
  </script>
</body>
</html>
